name: Windows release smoke

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: windows-release-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-release-smoke:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check release smoke scripts
        run: |
          node --check scripts/smoke-packaged.cjs
          node --check electron/main.mjs

      - name: Build Windows app
        run: npm run dist:win

      - name: Smoke-test packaged Windows app
        run: npm run smoke:packaged
        env:
          GENAI_SMOKE_TIMEOUT_MS: 90000
          GENAI_SMOKE_OUTPUT_DIR: test-results

      - name: Upload Windows artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          if-no-files-found: error
          path: |
            dist-electron/*win-x64-installer.exe
            dist-electron/*win-x64-portable.exe
            test-results/**
