<!doctype html>
<html lang="zh-Hant-TW" class="h-full">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>聊天機器人介面</title>
		<!-- Immediately set theme to prevent flicker -->
		<script>
			(function () {
				const theme = localStorage.getItem("theme") || "system";
				const systemTheme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
				const actualTheme = theme === "system" ? systemTheme : theme;
				document.documentElement.setAttribute("data-theme", actualTheme);
				document.documentElement.classList.toggle("dark", actualTheme === "dark");
			})();
		</script>
		<link rel="stylesheet" href="build/css/styles.css?v=zh-tw8" />
		<link rel="stylesheet" href="native-polish.css?v=4" />
		<script type="module" src="build/js/pages/3-1-chatbot-interface.js?v=mini-lit-full-1"></script>
	</head>
	<body class="h-full overflow-hidden"><script type="module" src="local-pi-auth.js?v=proper-i18n-1"></script>
</body>
</html>
